[agent]
  interval = "10s"
  flush_interval = "10s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics  = ["IESWIC3A/+/data"]
  data_format = "json_v2"

  # Extract sensor_type (1/2/3) from topic path IESWIC3A/{sensor_type}/data
  topic_tag = ""
  [[inputs.mqtt_consumer.topic_parsing]]
    topic  = "IESWIC3A/<sensor_type>/data"
    tags   = "_/<sensor_type>/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "IESWIC3A"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "device_id"
      rename = "device_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "sensor_type_label"
      rename = "sensor_type_label"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "sensor_type"
      rename = "sensor_type"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "firmware"
      rename = "firmware"
      type   = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "rssi"
      rename = "rssi"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "temperature"
      rename = "temperature"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "humidity"
      rename = "humidity"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_temp"
      rename = "alert_temp"
      type   = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_hum"
      rename = "alert_hum"
      type   = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "co2"
      rename = "co2"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "co2_label"
      rename = "co2_label"
      type   = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_co2"
      rename = "alert_co2"
      type   = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_temp_num"
      rename = "alert_temp_num"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_hum_num"
      rename = "alert_hum_num"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_co2_num"
      rename = "alert_co2_num"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "light_on"
      rename = "light_on"
      type   = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "light_on_num"
      rename = "light_on_num"
      type   = "int"

# Device config (thresholds)
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics  = ["IESWIC3A/+/config"]
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "device_config"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "device_id"
      rename = "device_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "sensor_type"
      rename = "sensor_type"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "temp_high"
      rename = "temp_high"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "temp_low"
      rename = "temp_low"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "hum_high"
      rename = "hum_high"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "hum_low"
      rename = "hum_low"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "co2_high"
      rename = "co2_high"
      type   = "float"

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "my-super-secret-token"
  organization = "myorg"
  bucket       = "esp32_sensors"