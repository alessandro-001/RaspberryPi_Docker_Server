[agent]
  interval = "10s"
  flush_interval = "10s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics  = ["IESWIC3A/#"]
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "IESWIC3A"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path   = "device_id"
      rename = "device_id"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "firmware"
      rename = "firmware"
      type   = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "rssi"
      rename = "rssi"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "temperature"
      rename = "temperature"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "humidity"
      rename = "humidity"
      type   = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_temp"
      rename = "alert_temp"
      type   = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "alert_hum"
      rename = "alert_hum"
      type   = "bool"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "aqi"
      rename = "aqi"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "aqi_label"
      rename = "aqi_label"
      type   = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "tvoc"
      rename = "tvoc"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "eco2"
      rename = "eco2"
      type   = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "air_quality_status"
      rename = "air_quality_status"
      type   = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path   = "light_on"
      rename = "light_on"
      type   = "bool"

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "my-super-secret-token"
  organization = "myorg"
  bucket       = "esp32_sensors"